<!DOCTYPE html>
<html>
<head>
    <title>Challenge_3</title>
</head>
<body>
 
    <h1>Challenge_24.11.6131</h1>
    <table border="1">
        <tr>
            <th colspan="3" bgcolor="orange">Daftar Buku</th>
        </tr>
        <tr>
            <td rowspan="3"><img src="buku.jpg" width="100"></td>
            <td>judul</td>
            <td>: Web Programming</td>
        </tr>
        <tr>
            <td>harga</td>
            <td>: Rp. 245.000,00</td>
        </tr>
        <tr>
            <td>pengarang</td>
            <td>: John Dean</td>
        </tr>
    </table>
 
    <br>
 
    <!-- Form -->
    <form method="post" action="">
        <b>Isilah formulih dibawah ini</b>
        <table>
            <tr>
                <td>Nama:</td>
                <td><input type="text" name="nama" placeholder="Nama Kamu"></td>
            </tr>
            <tr>
                <td>Password:</td>
                <td><input type="password" name="password"></td>
            </tr>
            <tr>
                <td>Jenis Kelamin:</td>
                <td>
                    <input type="radio" name="jk" value="laki" checked> Laki - Laki
                    <input type="radio" name="jk" value="perempuan"> Perempuan
                </td>
            </tr>
            <tr>
                <td>Hobi:</td>
                <td>
                    <input type="checkbox" name="hobi" value="membaca"> Membaca Buku
                    <input type="checkbox" name="hobi" value="menulis" checked> Menulis
                    <input type="checkbox" name="hobi" value="memancing"> Memancing
                </td>
            </tr>
            <tr>
                <td>Asal Kota:</td>
                <td>
                    <select name="kota">
                        <option value="semarang">Semarang</option>
                        <option value="jakarta">Jakarta</option>
                        <option value="yogyakarta">Yogyakarta</option>
                        <option value="surabaya">Surabaya</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>Komentar Anda:</td>
                <td>
                    <textarea name="komentar" rows="4" cols="30">Silahkan katakan isi hati anda</textarea>
                </td>
            </tr>
            <tr>
                <td colspan="2">
                    <input type="submit" value="Mulai Proses!">
                </td>
            </tr>
        </table>
    </form>
 
</body>
</html
